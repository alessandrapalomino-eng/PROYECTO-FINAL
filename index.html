<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Almacén Sport - Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="registro-producto">
        <h2>Registro de Nuevo Producto - Ropa Deportiva</h2>
        <form id="form-registro">
            <div class="campo">
                <label>Código del Producto:</label>
                <input type="text" id="codigo" placeholder="Ej: ZAP-NIKE-01" required>
            </div>
            
            <div class="campo">
                <label>Nombre del Producto:</label>
                <input type="text" id="nombre" placeholder="Ej: Zapatillas Running XT" required>
            </div>

            <div class="campo">
                <label>Stock Inicial:</label>
                <input type="number" id="stock-inicial" min="0" value="0" required>
            </div>

            <div class="campo">
                <label>Costo Unitario Inicial (S/):</label>
                <input type="number" id="costo-inicial" min="0" step="0.01" value="0.00" required>
            </div>

            <button type="submit" id="btn-registrar">Registrar Producto</button>
        </form>
    </section>

    <div id="mensaje-exito"></div>

    <script src="script.js"></script>
</body>
</html>
<hr> <section id="recepcion-productos">
    <h2>Módulo 2: Recepción de Mercadería (Ingreso)</h2>
    <form id="form-recepcion">
        <div class="campo">
            <label>Código del Producto:</label>
            <input type="text" id="recep-codigo" placeholder="Ej: ZAP-NIKE-01" required>
        </div>
        
        <div class="campo">
            <label>Cantidad Recibida:</label>
            <input type="number" id="recep-cantidad" min="1" required>
        </div>

        <div class="campo">
            <label>Costo Unitario de Compra (S/):</label>
            <input type="number" id="recep-costo" min="0.01" step="0.01" required>
        </div>

        <button type="submit" id="btn-recepcion" style="background-color: #3498db;">Registrar Ingreso</button>
    </form>
</section>
